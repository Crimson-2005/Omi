<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Happy Birthday Omii 🎉</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <!-- AOS Animation -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
</head>

<body>

<!-- ================= LOADING SCREEN ================= -->
<div id="loading">
  <h1>Loading Something Cool...</h1>
  <p id="intro-timer">5</p>
  <button id="revealBtn" class="hidden">Ready? Click Here 😎</button>
</div>

<!-- ================= INTRO CARD ================= -->
<div class="card" data-aos="zoom-in">
  <h2>Happy Birthday, Bhaiii 🎉🔥</h2>
  <p>
   TEXT
  </p>
</div>

<div class="divider">• • • ⚡ • • •</div>

<!-- ================= GAME INTRO ================= -->
<div class="card" id="gameIntro">
  <h2>Before things get serious…</h2>
  <p>Let’s see if you’ve still got skills 😏🎮</p>
  <p>Birthday = games. No excuses accepted!! </p>
  <button onclick="startHeartGame()">Start Game</button>
</div>

<!-- ================= GAME AREA ================= -->
<div class="card" id="gameArea" style="display:none;">
  <h2 id="gameTitle"></h2>
  <div id="gameBox" style="margin-top:20px;"></div>
  <p id="gameMessage" style="margin-top:20px;"></p>
</div>

<!-- ================= MAIN CONTENT ================= -->
<div id="mainContent">

  <div class="card" data-aos="zoom-in">
    <h2>This One’s For You 💯</h2>
    <p>
     TEXT 💫
    </p>
    <img src="pic1.jpeg" alt="Memory">
  </div>

</div>

<!-- ================= BACKGROUND EFFECTS ================= -->
<div class="particles"></div>
<div id="balloons"></div>

<!-- ================= AUDIO ================= -->
<audio id="birthdayMusic" preload="auto" loop>
  <source src="birthday.mp3" type="audio/mpeg">
</audio>

<!-- ================= CONFETTI ================= -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<!-- ================= JS ================= -->
<script src="script.js"></script>

</body>
</html>
